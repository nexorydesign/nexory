<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt — NEXORY Elite Digital Engineering</title>
    <link rel="stylesheet" href="css/main.css">

    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

    <script>
        (function(){
            emailjs.init("phBYM7_pLMYLRhzTl");
        })();
    </script>

</head>
<body>

<!-- (SVE OSTALO OSTAVLJENO ISTO KAO TVOJE) -->

<!-- FORM -->
<form class="contact-form" id="contactForm">
    <div class="form-row">
        <div class="form-group">
            <label for="firstName" class="form-label">Ime *</label>
            <input type="text" id="firstName" name="firstName" class="form-input" required>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="email" class="form-label">Email *</label>
            <input type="email" id="email" name="email" class="form-input" required>
        </div>
        
        <div class="form-group">
            <label for="phone" class="form-label">Telefon</label>
            <input type="tel" id="phone" name="phone" class="form-input">
        </div>
    </div>

    <div class="form-group">
        <label for="service" class="form-label">Interesovanje *</label>
        <select id="service" name="service" class="form-select" required>
            <option value="">Izaberite uslugu</option>
            <option value="web">Izrada sajta</option>
            <option value="brand">Društvene mreže</option>
            <option value="automation">Automatizacija / odgovori</option>
            <option value="systems">Meta Ads kampanje</option>
            <option value="multiple">Više usluga</option>
            <option value="other">Ostalo</option>
        </select>
    </div>

    <button type="submit" class="btn-primary btn-large btn-full-width">
        <span class="btn-text">Pošalji</span>
        <span class="btn-arrow">→</span>
    </button>
</form>

<!-- SUCCESS -->
<div class="form-success" id="formSuccess" style="display: none;">
    <div class="success-icon">✓</div>
    <h3 class="success-title">Poruka je poslata</h3>
    <p class="success-message">Hvala! Javljamo se uskoro.</p>
</div>

<!-- SCRIPT -->
<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();

    emailjs.sendForm(
        "service_2h0pdxj",
        "template_kiqk76z",
        this
    ).then(function() {

        document.getElementById("contactForm").style.display = "none";
        document.getElementById("formSuccess").style.display = "block";

    }, function(error) {
        alert("Greška pri slanju: " + JSON.stringify(error));
    });
});
</script>

</body>
</html>
